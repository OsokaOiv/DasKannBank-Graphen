name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop/src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      - run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - run: cargo test -p dkb-core
      - run: cargo check

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx vitest run

  python-tests:
    name: Python Tests (Legacy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install matplotlib pandas pdfplumber pytest streamlit plotly fastapi uvicorn
      - run: python -m pytest legacy/tests/ -v

  build-macos:
    name: Build (macOS)
    strategy:
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    runs-on: macos-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          override: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - run: npm ci
      - run: npm run tauri build -- --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: dkb-dashboard-macos-${{ matrix.target }}
          path: desktop/src-tauri/target/${{ matrix.target }}/release/bundle/
          if-no-files-found: error

  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: x86_64-unknown-linux-gnu
          override: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - run: npm ci
      - run: npm run tauri build -- --target x86_64-unknown-linux-gnu

      - uses: actions/upload-artifact@v4
        with:
          name: dkb-dashboard-linux-x86_64
          path: desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/
          if-no-files-found: error

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc
          override: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - run: npm ci
      - run: npm run tauri build -- --target x86_64-pc-windows-msvc

      - uses: actions/upload-artifact@v4
        with:
          name: dkb-dashboard-windows-x86_64
          path: desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/
          if-no-files-found: error
